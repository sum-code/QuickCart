spring.application.name=quickcart
server.port=8080
# Database (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/quickcartdb
spring.datasource.username=postgres
spring.datasource.password=Vaibhav@123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=this-is-a-dev-secret-change-me-please-32bytes
app.jwt.expiration-minutes=60

# Optional: enable admin registration only when this secret is set.
# Example: app.admin.registration.code=some-strong-secret
app.admin.registration.code=QuickCart
# Logging configuration
logging.level.org.springframework=INFO
logging.level.com.quickcart=DEBUG
